name: XP Engine

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  award-xp:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect Bender + events
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Get changed files
          CHANGED=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          echo "Changed files:"
          echo "$CHANGED"

          # Find a file matching CodeBenders/*/*/*
          BENDER_PATH=$(echo "$CHANGED" | grep -E '^CodeBenders/[^/]+/[^/]+/' | head -1 || true)

          if [ -z "$BENDER_PATH" ]; then
            echo "No CodeBenders path found â€” skipping XP award."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract HANDLE = 3rd path segment
          HANDLE=$(echo "$BENDER_PATH" | cut -d'/' -f3)
          echo "handle=$HANDLE" >> "$GITHUB_OUTPUT"
          echo "Detected handle: $HANDLE"

          # Determine events from changed paths
          declare -A SEEN_EVENTS

          while IFS= read -r FILE; do
            # Profile sections
            if echo "$FILE" | grep -qE '^CodeBenders/[^/]+/[^/]+/(story|stack|socials)/'; then
              SEEN_EVENTS[profile_update]=1
            fi
            # Demo
            if echo "$FILE" | grep -qE '^CodeBenders/[^/]+/[^/]+/demo/'; then
              SEEN_EVENTS[demo_added]=1
            fi
            # SKILL.md
            if echo "$FILE" | grep -qE '^CodeBenders/[^/]+/[^/]+/SKILL\.md$'; then
              SEEN_EVENTS[skill_updated]=1
            fi
          done <<< "$CHANGED"

          EVENTS=$(IFS=,; echo "${!SEEN_EVENTS[*]}")

          if [ -z "$EVENTS" ]; then
            echo "No trackable events found â€” skipping XP award."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "events=$EVENTS" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Detected events: $EVENTS"

      - name: Install deps
        if: steps.detect.outputs.skip != 'true'
        run: cd .github/scripts && npm install

      - name: Run compute-xp.js
        id: xp
        if: steps.detect.outputs.skip != 'true'
        env:
          HANDLE: ${{ steps.detect.outputs.handle }}
          EVENTS: ${{ steps.detect.outputs.events }}
        run: |
          RESULT=$(node .github/scripts/compute-xp.js \
            --handle "$HANDLE" \
            --events "$EVENTS" \
            --registry registry/registry.json \
            --leaderboard registry/leaderboard.json)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "XP result: $RESULT"

      - name: Post promotion comment
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RESULT: ${{ steps.xp.outputs.result }}
          HANDLE: ${{ steps.detect.outputs.handle }}
        run: |
          PROMOTED=$(echo "$RESULT" | node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).promoted))")
          NEW_RANK=$(echo "$RESULT" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).rankAfter)")

          if [ "$PROMOTED" = "true" ]; then
            gh pr comment "$PR_NUMBER" \
              --body "đźŽ‰ Rank up! **$HANDLE** is now a **$NEW_RANK** Bender!"
          fi

      - name: Commit registry updates
        if: steps.detect.outputs.skip != 'true'
        env:
          RESULT: ${{ steps.xp.outputs.result }}
          HANDLE: ${{ steps.detect.outputs.handle }}
        run: |
          GAINED=$(echo "$RESULT" | node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).gained))")
          NEW_RANK=$(echo "$RESULT" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).rankAfter)")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/registry.json registry/leaderboard.json
          git diff --staged --quiet || git commit -m "chore(xp): +${GAINED}xp for ${HANDLE} â†’ ${NEW_RANK}"
          git push origin main
