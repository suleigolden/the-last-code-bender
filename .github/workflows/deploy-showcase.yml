name: Deploy Showcase

on:
  pull_request:
    types: [closed]
    paths:
      - 'CodeBenders/**/demo/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed demo handle
        id: detect
        run: |
          HANDLE=$(git diff --name-only HEAD~1 HEAD \
            | grep 'CodeBenders/' \
            | grep '/demo/' \
            | awk -F'/' 'NF>=3 {print $3}' \
            | sort -u \
            | head -1)
          if [ -z "$HANDLE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "handle=$HANDLE" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy demo
        id: deploy
        if: steps.detect.outputs.skip != 'true'
        run: |
          DEMO_URL=$(node .github/scripts/deploy-showcase.js \
            --handle "${{ steps.detect.outputs.handle }}" \
            --codebenders CodeBenders \
            --registry registry/registry.json \
            --public public)
          echo "demo_url=$DEMO_URL" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/registry.json
          git add public/demos/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "deploy(showcase): ${{ steps.detect.outputs.handle }} demo"
          git push origin main

      - name: Post PR comment
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "🚀 Demo deployed: ${{ steps.deploy.outputs.demo_url }}"
