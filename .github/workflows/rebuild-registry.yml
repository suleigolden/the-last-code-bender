name: Rebuild Registry

on:
  pull_request:
    types: [closed]
    paths:
      - 'CodeBenders/**'

permissions:
  contents: write

jobs:
  rebuild:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild registry
        run: node .github/scripts/rebuild-registry.js

      - name: Extract handle from changed paths
        id: extract_handle
        run: |
          HANDLE=$(git diff --name-only HEAD~1 HEAD \
            | grep '^CodeBenders/' \
            | awk -F'/' 'NF>=3 {print $3}' \
            | sort -u \
            | head -1)
          echo "handle=${HANDLE:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Commit updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/registry.json registry/leaderboard.json
          git diff --staged --quiet || git commit -m "chore(registry): sync ${{ steps.extract_handle.outputs.handle }}"
          git push origin main
