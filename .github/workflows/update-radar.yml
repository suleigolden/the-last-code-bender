name: Update Tech Radar

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-radar:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect stack.json changes
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changed=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path' \
            | grep -E 'CodeBenders/.*/stack\.json' || true)
          if [ -z "$changed" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No stack.json files changed — skipping radar update."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed stack files:"
            echo "$changed"
          fi

      - name: Snapshot previous radar positions
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f registry/radar.json ]; then
            cp registry/radar.json /tmp/radar-before.json
          else
            echo '{"positions":{}}' > /tmp/radar-before.json
          fi

      - name: Generate radar
        if: steps.detect.outputs.skip == 'false'
        run: |
          node .github/scripts/generate-radar.js \
            --registry registry/registry.json \
            --codebenders CodeBenders \
            --output registry/radar.json

      - name: Post radar diff comment
        if: steps.detect.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node - <<'EOF'
          const fs = require('fs');

          function loadPositions(filePath) {
            try {
              const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              const map = {};
              for (const [pos, items] of Object.entries(data.positions || {})) {
                for (const item of items) {
                  map[item.tech] = pos;
                }
              }
              return map;
            } catch {
              return {};
            }
          }

          const before = loadPositions('/tmp/radar-before.json');
          const after  = loadPositions('registry/radar.json');

          const allTechs = new Set([...Object.keys(before), ...Object.keys(after)]);
          const moves = [];

          for (const tech of allTechs) {
            const prev = before[tech];
            const curr = after[tech];
            if (prev !== curr) {
              if (!prev && curr) {
                moves.push(`- **${tech}** added to **${curr}**`);
              } else if (prev && !curr) {
                moves.push(`- **${tech}** removed from **${prev}**`);
              } else {
                moves.push(`- **${tech}** moved from **${prev}** → **${curr}**`);
              }
            }
          }

          if (moves.length === 0) {
            console.log('No position changes — skipping comment.');
            process.exit(0);
          }

          const body = [
            '### 📡 Tech Radar Update',
            '',
            'The following technology positions changed with this PR:',
            '',
            ...moves,
            '',
            '_Radar snapshot committed to `registry/radar.json`._',
          ].join('\n');

          fs.writeFileSync('/tmp/radar-comment.txt', body);
          EOF

          if [ -f /tmp/radar-comment.txt ]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/radar-comment.txt
          fi

      - name: Commit radar snapshot
        if: steps.detect.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/radar.json
          git diff --staged --quiet || git commit -m "chore(radar): update tech radar snapshot"
          git push origin main
