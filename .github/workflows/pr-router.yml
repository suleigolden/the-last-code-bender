name: pr-router

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  classify:
    name: classify
    runs-on: ubuntu-latest
    outputs:
      path_type: ${{ steps.classify.outputs.path_type }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR
        id: classify
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          CHANGED_FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          echo "Changed files:"
          echo "$CHANGED_FILES"

          OWNED_FOLDER=$(grep -v '^#' .github/CODEOWNERS | grep "@${AUTHOR}" | awk '{print $1}' | head -1)
          echo "Author: $AUTHOR"
          echo "Owned folder: $OWNED_FOLDER"

          TYPE="structural"

          # profile_ui: all changed files are inside the author's owned profile UI folder
          if [ -n "$OWNED_FOLDER" ]; then
            ALL_IN_FOLDER=true
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              if [[ "$file" != ${OWNED_FOLDER#/}* ]]; then
                ALL_IN_FOLDER=false
                break
              fi
            done <<< "$CHANGED_FILES"

            if $ALL_IN_FOLDER; then
              TYPE="profile_ui"
            fi
          fi

          # Structural override: any change outside src/apps/codebender-profiles/ is structural
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" == .github/* ]] || \
               [[ "$file" == public/* ]] || \
               [[ "$file" == "package.json" ]] || \
               [[ "$file" == "package-lock.json" ]] || \
               [[ "$file" == "bun.lockb" ]] || \
               [[ "$file" == "vite.config"* ]] || \
               [[ "$file" == "tsconfig"* ]] || \
               [[ "$file" == "tailwind.config"* ]] || \
               [[ "$file" == "eslint.config"* ]] || \
               [[ "$file" == "postcss.config"* ]] || \
               [[ "$file" == "index.html" ]] || \
               [[ "$file" != src/apps/codebender-profiles/* ]]; then
              TYPE="structural"
              break
            fi
          done <<< "$CHANGED_FILES"

          echo "Detected type: $TYPE"
          echo "path_type=${TYPE}" >> "$GITHUB_OUTPUT"

      - name: Post classification comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PATH_TYPE: ${{ steps.classify.outputs.path_type }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          case "$PATH_TYPE" in
            profile_ui)
              MSG="**PR Router:** Detected as \`profile_ui\` — all changed files are inside @${AUTHOR}'s profile UI folder. Auto-merge will proceed after validation."
              ;;
            structural)
              MSG="**PR Router:** Detected as \`structural\` — this PR touches app/workflow/config files and requires manual review by @suleigolden."
              ;;
          esac
          gh pr comment "$PR_NUMBER" --body "$MSG"

  auto-merge:
    name: auto-merge
    needs: classify
    if: needs.classify.outputs.path_type == 'profile_ui'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and merge
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          git fetch origin pull/"$PR_NUMBER"/head:pr-head

          CHANGED_FILES=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          OWNED_FOLDER=$(grep -v '^#' .github/CODEOWNERS | grep "@${AUTHOR}" | awk '{print $1}' | head -1)
          FAIL_REASON=""

          if [ -z "$OWNED_FOLDER" ]; then
            FAIL_REASON="No CODEOWNERS entry found for @${AUTHOR}'s profile UI folder."
          fi

          # Verify all files are inside author's folder
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" != ${OWNED_FOLDER#/}* ]]; then
              FAIL_REASON="File \`$file\` is outside your profile UI folder (\`$OWNED_FOLDER\`)."
              break
            fi
          done <<< "$CHANGED_FILES"

          # File size and extension checks
          if [ -z "$FAIL_REASON" ]; then
            while IFS= read -r file; do
              [ -z "$file" ] && continue

              # Extension allowlist
              if [[ "$file" != *.tsx ]] && [[ "$file" != *.ts ]] && [[ "$file" != *.css ]] && \
                 [[ "$file" != *.png ]] && [[ "$file" != *.jpg ]] && [[ "$file" != *.svg ]] && [[ "$file" != *.md ]]; then
                FAIL_REASON="File \`$file\` has a disallowed extension. Allowed: .tsx .ts .css .png .jpg .svg .md"
                break
              fi

              # File size check (< 5 MB)
              BLOB=$(git rev-parse "pr-head:$file" 2>/dev/null || echo "")
              if [ -z "$BLOB" ]; then
                FAIL_REASON="Could not read file \`$file\` from PR head."
                break
              fi
              SIZE=$(git cat-file -s "$BLOB" 2>/dev/null || echo 0)
              if [ "$SIZE" -ge 5242880 ]; then
                FAIL_REASON="File \`$file\` exceeds the 5 MB size limit (${SIZE} bytes)."
                break
              fi
            done <<< "$CHANGED_FILES"
          fi

          if [ -n "$FAIL_REASON" ]; then
            gh pr review "$PR_NUMBER" --request-changes --body "**Auto-merge blocked:** $FAIL_REASON Please fix the issue and push again."
            gh pr comment "$PR_NUMBER" --body "**Auto-merge failed:** $FAIL_REASON"
            exit 1
          fi

          gh pr merge "$PR_NUMBER" \
            --squash \
            --auto \
            --subject "feat(profile-ui): add ${AUTHOR} profile component"
          gh pr comment "$PR_NUMBER" --body "**Profile UI merged automatically ✓** — all validations passed."

  flag-structural:
    name: flag-structural
    needs: classify
    if: needs.classify.outputs.path_type == 'structural'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Post structural review comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "This PR is classified as **structural** and needs manual review by @suleigolden."

      - name: Add needs-human-review label
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "needs-human-review"

      - name: Request review from maintainer
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-reviewer suleigolden
