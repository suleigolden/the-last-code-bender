name: Challenge Judge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  judge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install judge dependencies
        run: cd .github/scripts && npm install

      - name: Detect submission
        id: detect
        run: |
          # Get changed files from the merged PR
          CHANGED=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path' 2>/dev/null || echo "")

          # Look for paths matching challenges/active/*/submissions/*/
          SUBMISSION_PATH=$(echo "$CHANGED" | grep -oE 'challenges/active/[^/]+/submissions/[^/]+' | head -1)

          if [ -z "$SUBMISSION_PATH" ]; then
            echo "No challenge submission detected in this PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract challenge slug (3rd segment: challenges/active/<slug>/...)
          CHALLENGE_SLUG=$(echo "$SUBMISSION_PATH" | cut -d'/' -f3)
          # Extract handle (5th segment: challenges/active/<slug>/submissions/<handle>)
          HANDLE=$(echo "$SUBMISSION_PATH" | cut -d'/' -f5)

          echo "challenge_slug=$CHALLENGE_SLUG" >> "$GITHUB_OUTPUT"
          echo "handle=$HANDLE"                 >> "$GITHUB_OUTPUT"
          echo "skip=false"                     >> "$GITHUB_OUTPUT"

          echo "Detected submission: handle=$HANDLE, challenge=$CHALLENGE_SLUG"

      - name: Run AI judge
        id: judge
        if: steps.detect.outputs.skip != 'true'
        run: |
          CHALLENGE_SLUG="${{ steps.detect.outputs.challenge_slug }}"
          HANDLE="${{ steps.detect.outputs.handle }}"

          SUBMISSION_DIR="challenges/active/$CHALLENGE_SLUG/submissions/$HANDLE"
          CHALLENGE_FILE="challenges/active/$CHALLENGE_SLUG/CHALLENGE.md"

          # Try to find the contributor's stack.json (discipline may vary)
          STACK_FILE=$(find "CodeBenders" -path "*/$HANDLE/stack/stack.json" 2>/dev/null | head -1 || echo "")

          SCORE_JSON=$(node .github/scripts/judge-submission.js \
            --submission "$SUBMISSION_DIR" \
            --challenge  "$CHALLENGE_FILE" \
            ${STACK_FILE:+--stack "$STACK_FILE"})

          echo "score_json=$SCORE_JSON" >> "$GITHUB_OUTPUT"
          echo "Score: $SCORE_JSON"

      - name: Post score comment
        if: steps.detect.outputs.skip != 'true'
        run: |
          SCORE_JSON='${{ steps.judge.outputs.score_json }}'
          HANDLE="${{ steps.detect.outputs.handle }}"
          CHALLENGE_SLUG="${{ steps.detect.outputs.challenge_slug }}"

          # Check for error in score
          if echo "$SCORE_JSON" | grep -q '"error"'; then
            gh pr comment "$PR_NUMBER" --body "## AI Judge

          ⚠️ The judge encountered an error scoring this submission:
          \`\`\`json
          $SCORE_JSON
          \`\`\`
          Please check that your submission files are in the correct path."
            exit 0
          fi

          TOTAL=$(echo "$SCORE_JSON"    | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(String(d.total))")
          CORR=$(echo "$SCORE_JSON"     | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(String(d.correctness))")
          PERF=$(echo "$SCORE_JSON"     | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(String(d.performance))")
          STYL=$(echo "$SCORE_JSON"     | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(String(d.style))")
          FB_C=$(echo "$SCORE_JSON"     | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(d.feedback.correctness)")
          FB_P=$(echo "$SCORE_JSON"     | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(d.feedback.performance)")
          FB_S=$(echo "$SCORE_JSON"     | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(d.feedback.style)")

          COMMENT="## AI Judge Score: $TOTAL/100

          - **Correctness:** $CORR/40 — $FB_C
          - **Performance:** $PERF/30 — $FB_P
          - **Style:** $STYL/30 — $FB_S"

          if [ "$TOTAL" -lt 40 ]; then
            COMMENT="$COMMENT

          ⚠️ Score below 40/100 — XP not awarded. Please improve your submission and re-submit."
          fi

          gh pr comment "$PR_NUMBER" --body "$COMMENT"

      - name: Award XP and update registry
        if: steps.detect.outputs.skip != 'true'
        run: |
          SCORE_JSON='${{ steps.judge.outputs.score_json }}'
          HANDLE="${{ steps.detect.outputs.handle }}"
          CHALLENGE_SLUG="${{ steps.detect.outputs.challenge_slug }}"

          # Skip if error or score < 40
          if echo "$SCORE_JSON" | grep -q '"error"'; then
            echo "Error in score — skipping XP award."
            exit 0
          fi

          TOTAL=$(echo "$SCORE_JSON" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); process.stdout.write(String(d.total))")

          if [ "$TOTAL" -lt 40 ]; then
            echo "Score $TOTAL < 40 — skipping XP award."
            exit 0
          fi

          # Update registry.json using Node
          node - <<'NODEEOF'
          const fs = require('fs');
          const registryPath = 'registry/registry.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));

          const handle = process.env.HANDLE;
          const challengeSlug = process.env.CHALLENGE_SLUG;
          const scoreJson = JSON.parse(process.env.SCORE_JSON);
          const total = scoreJson.total;

          // Find current top score for this challenge
          const topScoreKey = `challenge_top_score_${challengeSlug}`;
          const topScores = registry
            .filter(e => e[topScoreKey] !== undefined)
            .map(e => e[topScoreKey]);
          const currentTop = topScores.length ? Math.max(...topScores) : -1;

          const entry = registry.find(e => e.handle === handle);
          if (!entry) {
            console.log(`Handle ${handle} not found in registry — skipping.`);
            process.exit(0);
          }

          // Award participant XP
          entry.xp = (entry.xp || 0) + 10;
          entry[topScoreKey] = total;

          // Award winner XP if top score
          if (total > currentTop) {
            entry.xp += 50;
            entry.challenge_wins = (entry.challenge_wins || 0) + 1;
            console.log(`${handle} is new top scorer with ${total} — awarded +50 XP`);
          }

          console.log(`Awarded +10 XP to ${handle}. New XP: ${entry.xp}`);
          fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n');
          NODEEOF
        env:
          HANDLE: ${{ steps.detect.outputs.handle }}
          CHALLENGE_SLUG: ${{ steps.detect.outputs.challenge_slug }}
          SCORE_JSON: ${{ steps.judge.outputs.score_json }}

      - name: Rebuild leaderboard
        if: steps.detect.outputs.skip != 'true'
        run: |
          node - <<'NODEEOF'
          const fs = require('fs');
          const registry = JSON.parse(fs.readFileSync('registry/registry.json', 'utf8'));

          const sorted = [...registry]
            .sort((a, b) => (b.xp || 0) - (a.xp || 0))
            .map((entry, idx) => ({
              position: idx + 1,
              handle: entry.handle,
              github: entry.github,
              discipline: entry.discipline,
              rank: entry.rank,
              xp: entry.xp || 0,
            }));

          const leaderboard = {
            snapshot_at: new Date().toISOString(),
            entries: sorted,
          };

          fs.writeFileSync('registry/leaderboard.json', JSON.stringify(leaderboard, null, 2) + '\n');
          console.log('Leaderboard rebuilt with', sorted.length, 'entries.');
          NODEEOF

      - name: Commit results
        if: steps.detect.outputs.skip != 'true'
        run: |
          HANDLE="${{ steps.detect.outputs.handle }}"
          CHALLENGE_SLUG="${{ steps.detect.outputs.challenge_slug }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add registry/registry.json registry/leaderboard.json
          git diff --staged --quiet || git commit -m "chore(challenges): record score for $HANDLE on $CHALLENGE_SLUG"
          git push origin main
