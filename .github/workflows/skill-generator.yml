name: skill-generator

on:
  pull_request:
    types: [closed]

jobs:
  generate-skill:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect Bender rank folder
        id: detect
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')
          RANK_FOLDER=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [[ "$f" == CodeBenders/*/*/* ]]; then
              RANK_FOLDER=$(echo "$f" | cut -d/ -f1-3)
              break
            fi
          done <<< "$CHANGED"
          if [ -z "$RANK_FOLDER" ]; then
            echo "No CodeBenders rank folder detected — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "rank_folder=$RANK_FOLDER" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if SKILL.md already exists
        if: steps.detect.outputs.skip == 'false'
        id: check_skill
        env:
          RANK_FOLDER: ${{ steps.detect.outputs.rank_folder }}
        run: |
          if [ -f "$RANK_FOLDER/SKILL.md" ]; then
            echo "SKILL.md already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install script deps
        if: steps.detect.outputs.skip == 'false' && steps.check_skill.outputs.skip == 'false'
        run: cd .github/scripts && npm install

      - name: Generate SKILL.md
        if: steps.detect.outputs.skip == 'false' && steps.check_skill.outputs.skip == 'false'
        env:
          RANK_FOLDER: ${{ steps.detect.outputs.rank_folder }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          STORY="$RANK_FOLDER/story/story.md"
          STACK="$RANK_FOLDER/stack/stack.json"
          if [ ! -f "$STORY" ] || [ ! -f "$STACK" ]; then
            echo "story.md or stack.json not found — skipping skill generation."
            exit 0
          fi
          EXAMPLES_ARG=""
          if [ -d "$RANK_FOLDER/code-examples" ]; then
            FILES=$(find "$RANK_FOLDER/code-examples" -name "*.ts" -o -name "*.tsx" | tr '\n' ',')
            FILES="${FILES%,}"
            if [ -n "$FILES" ]; then
              EXAMPLES_ARG="--examples $FILES"
            fi
          fi
          node .github/scripts/generate-skill.js \
            --story "$STORY" \
            --stack "$STACK" \
            --handle "$AUTHOR" \
            $EXAMPLES_ARG > /tmp/SKILL.md

      - name: Open SKILL.md PR
        if: steps.detect.outputs.skip == 'false' && steps.check_skill.outputs.skip == 'false'
        env:
          RANK_FOLDER: ${{ steps.detect.outputs.rank_folder }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          [ ! -s /tmp/SKILL.md ] && echo "SKILL.md is empty — skipping PR." && exit 0

          BRANCH="auto/skill-${AUTHOR}-${PR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          cp /tmp/SKILL.md "$RANK_FOLDER/SKILL.md"
          git add "$RANK_FOLDER/SKILL.md"
          git commit -m "chore: auto-generate SKILL.md for @${AUTHOR}"
          git push origin "$BRANCH"

          NEW_PR_URL=$(gh pr create \
            --title "chore: auto-generate SKILL.md for @${AUTHOR}" \
            --body "Auto-generated SKILL.md for @${AUTHOR} based on their story, stack, and code examples. Review and merge to publish." \
            --base main \
            --head "$BRANCH")

          gh pr comment "$PR_NUMBER" \
            --body "**SKILL.md generated ✓** — A follow-up PR has been opened automatically: $NEW_PR_URL"
