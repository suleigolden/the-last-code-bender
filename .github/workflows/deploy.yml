name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-app:
    name: Deploy React App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Production site: thelastcodebender.com — no vercel.json in-repo; uses Vercel env + CLI.
      # Alternatives: Netlify (`netlify deploy --prod --dir=dist`), Cloudflare Pages, etc.
      - name: Deploy to Vercel (production)
        run: bunx vercel deploy ./dist --prod --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-edge-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect supabase/functions changes
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "$AFTER" | grep -qE '^supabase/functions/'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.filter.outputs.deploy == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Edge Function secrets
        if: steps.filter.outputs.deploy == 'true'
        run: |
          supabase secrets set "GITHUB_TOKEN=${{ secrets.EDGE_GITHUB_TOKEN }}" \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy review-skill function
        if: steps.filter.outputs.deploy == 'true'
        run: |
          supabase functions deploy review-skill --no-verify-jwt \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy judge-challenge function
        if: steps.filter.outputs.deploy == 'true'
        run: |
          supabase functions deploy judge-challenge --no-verify-jwt \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
